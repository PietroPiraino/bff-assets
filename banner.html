<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background: #2a2b45;
        font-family:
          Segoe UI,
          Arial,
          sans-serif;
      }
      a {
        display: block;
        padding: 10px 18px;
        text-decoration: none;
        background: #2a2b45;
      }
      a:hover {
        background: #32334f;
      }
      .row1 {
        margin-bottom: 5px;
      }
      .badge {
        background: #e63946;
        color: #fff;
        font-size: 11px;
        font-weight: bold;
        padding: 2px 7px;
      }
      .main {
        color: #f4a261;
        font-size: 14px;
        font-weight: bold;
        margin-left: 8px;
      }
      .sub {
        color: #e2e4f0;
        font-size: 11px;
        display: block;
        margin-bottom: 7px;
      }
      .cta {
        display: inline-block;
        background: #4c9be8;
        color: #fff;
        font-size: 11px;
        font-weight: bold;
        padding: 5px 16px;
      }
    </style>
  </head>
  <body>
    <a href="https://discord.gg/Bt3EUW2MG">
      <div class="row1">
        <span class="badge">BFF SCHOOL</span>&nbsp;<span class="main"
          >Vuoi migliorare ai Twister?</span
        >
      </div>
      <span class="sub">Unisciti alla scuola BFF — Best Fish Forever</span>
      <span class="cta">Entra su Discord &rarr;</span>
    </a>
  </body>
</html>
