<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a2b45;
    font-family: 'Segoe UI', sans-serif;
    width: 100%;
    height: 90px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  a {
    display: flex;
    align-items: center;
    width: 100%;
    height: 100%;
    padding: 0 24px;
    text-decoration: none;
    gap: 20px;
    cursor: pointer;
  }
  a:hover { background: #32334f; }
  .badge {
    background: #e63946;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .main {
    color: #f4a261;
    font-size: 16px;
    font-weight: bold;
    white-space: nowrap;
  }
  .sub {
    color: #e2e4f0;
    font-size: 12px;
    white-space: nowrap;
  }
  .cta {
    margin-left: auto;
    background: #4c9be8;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    padding: 8px 18px;
    border-radius: 6px;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <a href="https://discord.gg/Bt3EUW2MG" target="_blank">
    <span class="badge">BFF SCHOOL</span>
    <span class="main">Vuoi migliorare ai Twister?</span>
    <span class="sub">Unisciti alla scuola BFF — Best Fish Forever</span>
    <span class="cta">Entra su Discord →</span>
  </a>
</body>
</html>
